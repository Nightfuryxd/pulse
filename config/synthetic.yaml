# Synthetic Monitoring — URL/API health checks
# PULSE will probe these endpoints at the configured interval
# and alert if they fail or respond slowly.

targets:
  - id: pulse-self-check
    url: http://pulse-api:8000/health
    method: GET
    interval_seconds: 30
    timeout_seconds: 10
    expected_status: 200
    expected_body: "ok"
    check_ssl: false
    severity: critical
    teams: [infra]

  - id: google-dns
    url: https://dns.google/resolve?name=example.com
    method: GET
    interval_seconds: 60
    timeout_seconds: 5
    expected_status: 200
    check_ssl: true
    ssl_warn_days: 30
    severity: high

  - id: github
    url: https://github.com
    method: GET
    interval_seconds: 60
    timeout_seconds: 10
    expected_status: 200
    check_ssl: true
    ssl_warn_days: 14
    severity: critical
