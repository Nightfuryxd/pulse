# Team definitions — maps issue categories to on-call SMEs
# PULSE uses this to auto-route incidents and bridge notifications
#
# Contact providers supported:
#   slack         — Slack channel name (requires SLACK_BOT_TOKEN)
#   teams         — Microsoft Teams incoming webhook URL
#   discord       — Discord incoming webhook URL
#   telegram      — Telegram chat ID (requires TELEGRAM_BOT_TOKEN)
#   google_chat   — Google Chat webhook URL
#   zoom          — Zoom Team Chat webhook URL
#   pagerduty     — PagerDuty routing/integration key
#   opsgenie      — (uses global OPSGENIE_API_KEY, routes by tags)
#   email         — Email address (requires SMTP_* config)
#   sms           — Phone number in E.164 format (requires TWILIO_* config)
#   webhook       — Any HTTP endpoint that accepts JSON POST

teams:
  - id: secops
    name: Security Operations
    domains: [threat, auth_failure, intrusion, malware, port_scan, privilege_escalation, lateral_movement]
    contact:
      slack: "#secops-alerts"
      email: secops@company.com
      pagerduty: ""          # PagerDuty routing key for SecOps service
      discord: ""            # Discord webhook URL
      telegram: ""           # Telegram chat ID
      sms: ""                # On-call phone number

  - id: netops
    name: Network Operations
    domains: [network, latency, packet_loss, dns, firewall, bandwidth, connectivity]
    contact:
      slack: "#netops-alerts"
      email: netops@company.com
      pagerduty: ""
      teams: ""              # Teams webhook URL

  - id: appdev
    name: Application Development
    domains: [application, memory_leak, cpu_spike, error_rate, crash, deploy, code]
    contact:
      slack: "#appdev-alerts"
      email: appdev@company.com
      discord: ""
      google_chat: ""        # Google Chat webhook URL

  - id: dba
    name: Database Administration
    domains: [database, slow_query, connection_pool, replication, disk_io, postgres, mysql, redis]
    contact:
      slack: "#dba-alerts"
      email: dba@company.com
      pagerduty: ""

  - id: infra
    name: Infrastructure / SRE
    domains: [cpu, memory, disk, kernel, hardware, host, container, kubernetes, oom]
    contact:
      slack: "#infra-alerts"
      email: infra@company.com
      pagerduty: ""
      sms: ""
      telegram: "982892344"
      whatsapp: ""             # phone number in E.164 format (via Twilio)
      whatsapp_meta: ""        # phone number without + (via Meta Cloud API)

  # Escalation-only teams (no domains — only reached via escalation policies)
  - id: managers
    name: Engineering Managers
    domains: []
    contact:
      email: eng-managers@company.com
      slack: "#eng-managers"
      sms: ""

  - id: vp_eng
    name: VP Engineering
    domains: []
    contact:
      email: vp-eng@company.com
      sms: ""
